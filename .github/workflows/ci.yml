name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Doctor (config + version pins)
        run: python -m hermes_fetch_ai.cli doctor

      - name: Contamination scan
        run: python -m hermes_fetch_ai.cli doctor --contamination-scan

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Type check (mypy)
        run: python -m mypy src/hermes_fetch_ai --ignore-missing-imports

      - name: Unit tests (pytest)
        run: python -m pytest -q

      - name: Local end-to-end demo (in-process uAgent round trip)
        run: python -m hermes_fetch_ai.cli demo local
