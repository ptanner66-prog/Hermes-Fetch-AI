version: 1
agent:
  name: hermes_fetch_hermes_stdio
  port: 8002
  network: testnet
  mode: endpoint
  publish_manifest: false
  enable_agent_inspector: false
  dev_random_seed: true
hermes_mcp:
  mode: stdio
  # Public/release default assumes Hermes is installed on PATH.
  # For local source checkouts, use --config with a private YAML that points
  # command at the Hermes repo venv Python and args at:
  #   - -m
  #   - hermes_cli.main
  #   - mcp
  #   - serve
  command: hermes
  args:
    - mcp
    - serve
policy:
  public_tools:
    - conversations_list
    - events_poll
  denied_tools:
    - messages_send
    - permissions_respond
logging:
  redaction: true
chat:
  enable_chat: false
