version: 1
agent:
  name: hermes_fetch_hermes_stdio_env
  port: 8002
  network: testnet
  mode: endpoint
  publish_manifest: false
  enable_agent_inspector: false
  dev_random_seed: true
hermes_mcp:
  mode: stdio
  command: ${HERMES_FETCH_HERMES_PYTHON}
  args:
    - -m
    - hermes_cli.main
    - mcp
    - serve
policy:
  public_tools:
    - conversations_list
    - events_poll
  denied_tools:
    - messages_send
    - permissions_respond
logging:
  redaction: true
chat:
  enable_chat: false
